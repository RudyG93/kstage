name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Vitest (unit)
        run: npm run test

      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  # E2E Playwright. Désactivé par défaut : les specs ont besoin d'un vrai backend
  # Supabase (landing/calendar lisent la DB) + d'un compte test pour le golden
  # path auth. Pour l'activer, tout doit être au niveau REPOSITORY (pas
  # « Environment » : une variable d'env n'est PAS lisible dans un `if:` de job) :
  #   - Variables repo : E2E_ENABLED=true, NEXT_PUBLIC_SUPABASE_URL,
  #     NEXT_PUBLIC_SUPABASE_ANON_KEY (publiques), E2E_AUTH_EMAIL.
  #   - Secret repo : E2E_AUTH_PASSWORD.
  # Le golden path auth se skip proprement si les creds manquent ; les smoke restent.
  e2e:
    if: ${{ vars.E2E_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      # E2E contre un build prod : le dev server Turbopack compile chaque route
      # à la demande pendant que les tests tournent en parallèle → timeouts.
      # `next start` sert des routes précompilées (boot ~1 s). Step dédié :
      # un build cassé fait un step rouge lisible (Playwright ignore le stdout
      # du webServer par défaut).
      - name: Build (production)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Playwright E2E
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          E2E_AUTH_EMAIL: ${{ vars.E2E_AUTH_EMAIL }}
          E2E_AUTH_PASSWORD: ${{ secrets.E2E_AUTH_PASSWORD }}
